<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>The Cheer DJ — Manage Songs</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#08090c;--panel:rgba(255,255,255,.05);--line:rgba(255,255,255,.12);
    --hot:#499998;--cyan:#93d2d0;--muted:#9aa3ad;--grad:linear-gradient(135deg,#499998,#6fb9b7,#93d2d0)}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:#fff;font-family:'Sora',system-ui,-apple-system,sans-serif;
    line-height:1.5;padding:24px}
  .wrap{max-width:680px;margin:0 auto}
  h1{font-family:'Anton',Impact,sans-serif;font-weight:400;letter-spacing:.04em;font-size:28px;margin:0 0 4px;text-transform:uppercase}
  .muted{color:var(--muted);font-size:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px;margin-top:18px}
  label{display:block;font-size:13px;color:var(--cyan);margin:14px 0 6px;font-weight:600}
  input,select{width:100%;background:#0f1116;border:1px solid var(--line);color:#fff;
    border-radius:11px;padding:12px 13px;font-size:15px;font-family:inherit}
  input[type=file]{padding:9px}
  .btn{border:0;border-radius:12px;padding:13px 20px;font-weight:700;font-size:15px;cursor:pointer;
    color:#06201f;background:var(--grad);margin-top:18px;font-family:inherit}
  .btn.ghost{background:transparent;color:#fff;border:1px solid var(--line)}
  .btn[disabled]{opacity:.55;cursor:default}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .msg{margin-top:14px;font-size:14px;min-height:20px}
  .ok{color:#7fe0a6}.err{color:#ff8e8e}
  .tk{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line)}
  .tk:first-child{border-top:0}
  .tk .nm{font-weight:600}
  .tk .ct{color:var(--muted);font-size:13px}
  .tk img,.tk .ph{width:42px;height:42px;border-radius:9px;object-fit:cover;flex:none;background:var(--grad)}
  .tk .sp{flex:1}
  .del{background:transparent;border:1px solid var(--line);color:#ff8e8e;border-radius:9px;padding:7px 11px;cursor:pointer;font-size:13px}
  .hide{display:none}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px}
  code{background:#0f1116;padding:2px 6px;border-radius:6px;color:var(--cyan);font-size:13px}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <div>
      <h1>Manage Songs</h1>
      <div class="muted">The Cheer DJ control room</div>
    </div>
    <button class="btn ghost hide" id="signOut" style="margin:0">Sign out</button>
  </div>

  <!-- not configured -->
  <div class="card hide" id="setupCard">
    <strong>Almost there.</strong>
    <p class="muted">Add your Supabase project URL and anon key near the top of <code>admin.html</code> and <code>index.html</code>, then reload this page.</p>
  </div>

  <!-- login -->
  <div class="card hide" id="loginCard">
    <label>Email</label>
    <input id="email" type="email" autocomplete="username" placeholder="you@email.com">
    <label>Password</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="••••••••">
    <button class="btn" id="loginBtn">Log in</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- add song -->
  <div class="card hide" id="addCard">
    <strong>Add a mix</strong>
    <label>Song title</label>
    <input id="title" placeholder="e.g. Senior Night Hype">
    <label>Category</label>
    <select id="category">
      <option>Comp Day</option>
      <option>Team Hype</option>
      <option>Gym Mix</option>
      <option>Coaches</option>
    </select>
    <label>Audio file (mp3)</label>
    <input id="audio" type="file" accept="audio/*">
    <label>Cover image (optional)</label>
    <input id="cover" type="file" accept="image/*">
    <label>Order (lower shows first, optional)</label>
    <input id="sort" type="number" value="100">
    <div class="row">
      <button class="btn" id="addBtn">Upload and publish</button>
    </div>
    <div class="msg" id="addMsg"></div>
  </div>

  <!-- list -->
  <div class="card hide" id="listCard">
    <strong>Live songs</strong>
    <div id="list" style="margin-top:10px"></div>
  </div>

</div>

<script>
const SUPABASE_URL = "PASTE-YOUR-SUPABASE-URL";
const SUPABASE_ANON_KEY = "PASTE-YOUR-SUPABASE-ANON-KEY";
const BUCKET = "media";

const $ = id => document.getElementById(id);
const show = (id,on=true)=>$(id).classList.toggle('hide',!on);
let sb = null;

if (!window.supabase || SUPABASE_URL.startsWith("PASTE")) {
  show('setupCard', true);
} else {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  init();
}

async function init(){
  const { data:{ session } } = await sb.auth.getSession();
  session ? enterApp() : show('loginCard', true);
  sb.auth.onAuthStateChange((_e, s)=>{ if(!s){ show('addCard',false);show('listCard',false);show('signOut',false);show('loginCard',true);} });
}

$('loginBtn').onclick = async () => {
  const btn=$('loginBtn'); btn.disabled=true;
  $('loginMsg').textContent='';
  const { error } = await sb.auth.signInWithPassword({ email:$('email').value.trim(), password:$('password').value });
  btn.disabled=false;
  if(error){ $('loginMsg').className='msg err'; $('loginMsg').textContent=error.message; return; }
  enterApp();
};

$('signOut').onclick = async ()=>{ await sb.auth.signOut(); };

function enterApp(){
  show('loginCard',false); show('addCard',true); show('listCard',true); show('signOut',true);
  loadList();
}

function audioDuration(file){
  return new Promise(res=>{
    const a=document.createElement('audio'); a.preload='metadata';
    a.onloadedmetadata=()=>{res(Math.round(a.duration||0));URL.revokeObjectURL(a.src);};
    a.onerror=()=>res(0);
    a.src=URL.createObjectURL(file);
  });
}

function safeName(name){return Date.now()+'_'+name.replace(/[^a-zA-Z0-9._-]/g,'_').toLowerCase();}

async function uploadToBucket(folder, file){
  const path = folder+'/'+safeName(file.name);
  const { error } = await sb.storage.from(BUCKET).upload(path, file, { cacheControl:'3600', upsert:false });
  if(error) throw error;
  return sb.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;
}

$('addBtn').onclick = async () => {
  const m=$('addMsg'); m.className='msg';
  const title=$('title').value.trim();
  const file=$('audio').files[0];
  if(!title){ m.className='msg err'; m.textContent='Add a song title.'; return; }
  if(!file){ m.className='msg err'; m.textContent='Pick an audio file.'; return; }
  const btn=$('addBtn'); btn.disabled=true; m.className='msg'; m.textContent='Reading audio…';
  try{
    const dur = await audioDuration(file);
    m.textContent='Uploading audio…';
    const audio_url = await uploadToBucket('audio', file);
    let cover_url = null;
    const cf=$('cover').files[0];
    if(cf){ m.textContent='Uploading cover…'; cover_url = await uploadToBucket('covers', cf); }
    m.textContent='Saving…';
    const { error } = await sb.from('tracks').insert({
      name:title, category:$('category').value, audio_url, cover_url,
      duration:dur, sort_order:parseInt($('sort').value||'100',10)
    });
    if(error) throw error;
    m.className='msg ok'; m.textContent='Published. It is live on the site now.';
    $('title').value=''; $('audio').value=''; $('cover').value='';
    loadList();
  }catch(e){ m.className='msg err'; m.textContent='Error: '+(e.message||e); }
  btn.disabled=false;
};

async function loadList(){
  const { data, error } = await sb.from('tracks').select('*')
    .order('sort_order',{ascending:true}).order('created_at',{ascending:true});
  const box=$('list');
  if(error){ box.innerHTML='<div class="msg err">'+error.message+'</div>'; return; }
  if(!data.length){ box.innerHTML='<div class="muted">No songs yet.</div>'; return; }
  box.innerHTML='';
  data.forEach(t=>{
    const el=document.createElement('div'); el.className='tk';
    el.innerHTML = (t.cover_url?`<img src="${t.cover_url}" alt="">`:`<div class="ph"></div>`)
      + `<div class="sp"><div class="nm">${t.name}</div><div class="ct">${t.category} · ${fmtDur(t.duration)}</div></div>`
      + `<button class="del">Delete</button>`;
    el.querySelector('.del').onclick=async()=>{
      if(!confirm('Delete "'+t.name+'"?')) return;
      const { error } = await sb.from('tracks').delete().eq('id', t.id);
      if(error){ alert(error.message); return; }
      loadList();
    };
    box.appendChild(el);
  });
}

function fmtDur(s){ s=s||0; const m=Math.floor(s/60), sec=s%60; return m+':'+(sec<10?'0':'')+sec; }
</script>
</body>
</html>
